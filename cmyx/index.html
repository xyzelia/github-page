  <style>
    body {

    .page-wrapper {
      margin: 0;

      display: flex;

    }

    .page-wrapper {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background-color: transparent;
      position: relative;

    h1 {
      margin-top: 40px;
      margin-bottom: 0px;

      -webkit-text-fill-color: transparent;

    }

    .background-wrapper {

      background-position: center;

    .image-grid {
      position: absolute;

      top: 30%;
      /* 原来 200px 改成比例 */
      left: 5%;
      right: 5%;
      bottom: 5%;

      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2%;

      padding: 0 3% 3%;
      box-sizing: border-box;

      justify-items: center;
      align-items: center;
    }

    .character-image {

    }

    .character-image {
      width: 100%;
      max-width: 220px;
      height: auto;
      object-fit: contain;
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .download-button {
      width: clamp(220px, 40%, 420px);
      position: relative;
      margin-top: 10px;
      display: block;
      margin: 20px auto 0;
      text-align: center;
      padding: 15px 40px;
      font-size: 1.2em;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      text-decoration: none;
      background: linear-gradient(270deg, #be368b, #7457a0, #1f8bcd, #be368b);
      background-size: 600% 600%;
      color: #fff;
      border-radius: 10px;
      animation: gradientShift 3s ease infinite;
      transition: all 0.3s ease;
      z-index: 2;
    }

    .download-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
    }

    .disclaimer {
      max-width: 900px;
      margin: 0px auto 60px;

      padding: 15px 20px;

      font-size: 0.9rem;
      line-height: 1.6;

      color: #777;

      border-top: 1px solid rgba(0, 0, 0, 0.15);

      text-align: center;
    }
  </style>
</head>

<body>

        <img src="static/img/char/流衣_中_スーツ1（上着／スカート／ストッキング／室内靴）_b_真顔1.png"

<a id="download_button" href="#" class="download-button"
   data-token="aHR0cHM6Ly9naXRodWIuY29tL3h5emVsaWEvZ2l0aHViLXBhZ2UvcmVsZWFzZXMvZG93bmxvYWQvdjEuMC4wL1NhaW1pbll1dWdpLWNuLXYxLjAuemlw">
   下载
</a>

<script>
document.getElementById('download_button').addEventListener('click', function (e) {
    e.preventDefault();
    const button = this;
    if (button.classList.contains('downloading')) return;
    button.classList.add('downloading');
    const originalText = button.innerText;
    button.innerText = "下载中...";
    const encoded = button.getAttribute('data-token');
    const fileUrl = atob(encoded); 
    const customFileName = "催眠游戏汉化补丁[心海汉化组]-v1.0.zip"; 

    fetch(fileUrl)
        .then(response => {
            if (!response.ok) throw new Error('网络请求错误');
            return response.blob();
        })
        .then(blob => {
            const blobUrl = window.URL.createObjectURL(blob);
            
            const downloadAnchor = document.createElement('a');
            downloadAnchor.href = blobUrl;
            downloadAnchor.download = customFileName; 
            
            downloadAnchor.style.display = 'none';
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            
            document.body.removeChild(downloadAnchor);
            window.URL.revokeObjectURL(blobUrl);
        })
        .catch(err => {
            console.error('下载失败:', err);
            alert('下载失败，请稍后重试');
        })
        .finally(() => {
            button.classList.remove('downloading');
            button.innerText = originalText;
        });
});
</script>

  </div>



  <script>
    document.querySelectorAll('.image-grid img').forEach(img => {
      const originalSrc = img.src;
      const hoverSrc = img.dataset.hover;
      const originalBg = img.style.backgroundColor;
      const hoverBg = img.dataset.hovercolor || originalBg;

      img.addEventListener('mouseenter', () => {
        img.src = hoverSrc;
        img.style.backgroundColor = hoverBg;
      });

      img.addEventListener('mouseleave', () => {
        img.src = originalSrc;
        img.style.backgroundColor = originalBg;
      });
    });
  </script>
